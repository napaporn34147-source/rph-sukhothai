html{height:100%}body{min-height:100vh}

.app{max-width:100%;margin:0 auto;padding:20px;box-sizing:border-box;min-height:100vh}

.steps{display:flex;gap:6px;margin-bottom:10px}

.prog-track{height:5px;background:#E5E7EB;border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:#1D9E75;border-radius:3px;transition:width .5s}
.card{background:#fff;border-radius:12px;border:1px solid #E5E7EB;margin-bottom:10px;overflow:hidden}
.card-pad{padding:20px 24px}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:15px;font-weight:600;color:#6B7280}
.field input,.field select{padding:9px 12px;border:1.5px solid #D1D5DB;border-radius:8px;font-size:16px;background:#fff;color:#111827;font-family:'Sarabun',sans-serif;outline:none;transition:border-color .2s;width:100%}
.field input:focus,.field select:focus{border-color:#1B3A6B}
.full{grid-column:1/-1}
.comp-hdr{padding:12px 18px 8px;border-bottom:1px solid #E5E7EB;display:flex;align-items:center;gap:10px}
.comp-name{font-size:16px;font-weight:600}
.comp-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.lv-block{border-bottom:1px solid #F3F4F6}

.lv-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 18px}
.lv-label{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:600}
.badge{font-size:13px;padding:3px 10px;border-radius:10px;font-weight:600}

.b2{background:#E1F5EE;color:#065F46}

.ind-row.tk1{background:#F0FDFA}
.ind-row.tk2{background:#F5F3FF}
.ind-row.tk3{background:#FFF7ED}
.chk{width:22px;height:22px;cursor:pointer;flex-shrink:0;margin-top:2px;accent-color:#1D9E75}
.ind-name{font-size:15px;font-weight:600;color:#111827}
.ind-desc{font-size:13px;color:#6B7280;margin-top:2px;line-height:1.6}
.score-row{display:flex;align-items:center;gap:8px;padding:8px 18px;background:#F9FAFB}
.score-lbl{font-size:13px;color:#6B7280;min-width:60px}
.pills{display:flex;gap:5px;flex-wrap:wrap}
.pill{font-size:13px;padding:3px 10px;border-radius:10px;font-weight:600}
.pp{background:#DCFCE7;color:#14532D}
.pf{background:#FEF2F2;color:#991B1B}
.pl{background:#E5E7EB;color:#9CA3AF}
.banner{margin:6px 18px;padding:8px 12px;border-radius:8px;font-size:14px;font-weight:600;display:none;align-items:center;gap:6px}
.bok{background:#DCFCE7;color:#14532D;border:1px solid #86EFAC}
.bno{background:#FEF9C3;color:#713F12;border:1px solid #FDE047}
.sum-box{background:#F9FAFB;border-radius:8px;padding:10px 14px;margin-bottom:10px}
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:15px;border-bottom:1px solid #E5E7EB}
.sum-row:last-child{border-bottom:none}
.tpass{color:#14532D;font-weight:600}
.tfail{color:#991B1B;font-weight:600}

.btn-pri{padding:13px 28px;background:#1B3A6B;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;font-family:'Sarabun',sans-serif;transition:opacity .2s}
.btn-pri:hover{opacity:.88}
.btn-pri:disabled{background:#9CA3AF;cursor:not-allowed}
.btn-sec{padding:13px 20px;background:#F3F4F6;color:#6B7280;border:1.5px solid #D1D5DB;border-radius:8px;font-size:16px;cursor:pointer;font-family:'Sarabun',sans-serif}
.note{font-size:14px;color:#9CA3AF}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center}
.overlay.show{display:flex}
.modal{background:#fff;border-radius:14px;padding:28px 32px;max-width:380px;width:90%;text-align:center}
.modal h2{font-size:18px;margin-bottom:8px}
.modal p{font-size:13px;color:#6B7280;line-height:1.6;margin-bottom:18px}
.spin{width:40px;height:40px;border:4px solid #E5E7EB;border-top-color:#1B3A6B;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){.fgrid{grid-template-columns:1fr}.steps .sb{font-size:9px;padding:6px 2px}}
</style>

     {id:'c4l1i4',n:'การประเมินความเสี่ยง',d:'ระบุปัจจัยเสี่ยงที่อาจเกิดขึ้นในงาน และเสนอแนวทางป้องกันเบื้องต้นได้'},
     {id:'c4l1i5',n:'การทำงานภายใต้แรงกดดัน',d:'รักษาระดับมาตรฐานการทำงานได้ดี แม้เผชิญปัญหาหรืออยู่ภายใต้ภาวะกดดัน'},
   ],
   lv2:[
     {id:'c4l2i1',n:'การให้ข้อเสนอแนะ',d:'วิเคราะห์จุดเด่น-จุดด้อยของตนเองและผู้อื่นได้อย่างชัดเจน พร้อมให้คำแนะนำในการพัฒนาตนเองและเพื่อนร่วมงาน'},
     {id:'c4l2i2',n:'การใช้นวัตกรรม',d:'นำแนวคิดใหม่ๆ หรือนวัตกรรม (เช่น เครื่องมือดิจิทัล, วิธีการทำงานแบบใหม่) มาปรับปรุงงาน และสนับสนุนให้ทีมกล้าคิดสร้างสรรค์'},
     {id:'c4l2i3',n:'ความรวดเร็วในการตอบสนอง',d:'ตอบสนองต่อสถานการณ์ฉุกเฉินหรือความเปลี่ยนแปลงต่างๆ ได้อย่างฉับไวและทันเวลา'},
     {id:'c4l2i4',n:'การวิเคราะห์ความเชื่อมโยงความเสี่ยง',d:'คาดการณ์แนวโน้ม วิเคราะห์ปัจจัยเสี่ยงทั้งทางตรงและทางอ้อม และกำหนดมาตรการรับมือผลกระทบได้'},
     {id:'c4l2i5',n:'ความมุ่งมั่น',d:'รักษาระดับความพยายาม แม้ต้องเผชิญกับความผิดพลาด โดยใช้หลักการและเหตุผลในการอธิบาย'},
   ],
   lv3:[
     {id:'c4l3i1',n:'การแสวงหาโอกาส',d:'สนับสนุนให้ผู้อื่นมองเห็นศักยภาพตนเอง และแสวงหาโอกาสพัฒนาตนเองและหน่วยงานอย่างต่อเนื่อง'},
     {id:'c4l3i2',n:'การสร้างบรรยากาศเปิดกว้าง',d:'สร้างและสนับสนุนวัฒนธรรมการทำงานที่เปิดกว้าง ยืดหยุ่น คล่องตัว และตอบสนองต่อสถานการณ์ได้ทันท่วงที'},
     {id:'c4l3i3',n:'การลดความเสี่ยงเชิงระบบ',d:'คาดการณ์ความเสี่ยงระยะยาว และวางแผนพัฒนาแนวทางลดผลกระทบที่มีต่อองค์กร/โรงพยาบาลได้'},
     {id:'c4l3i4',n:'การเป็นต้นแบบความยืดหยุ่น',d:'ให้คำปรึกษาแนะนำอย่างสุขุมรอบคอบ และแสดงให้เห็นถึงความมุ่งมั่นในการทำงานขั้นสูง แม้โครงการหรือภารกิจจะประสบความล้มเหลว'},
     {id:'c4l3i5',n:'การถ่ายทอดและต่อยอดนวัตกรรม',d:'ถ่ายทอดและต่อยอดองค์ความรู้หรือผลงานนวัตกรรม เพื่อขยายผลการพัฒนาสู่ระดับองค์กรอย่างยั่งยืน'},
   ]},
];

let curStep=0, maxLv=1;
const TH={1:5,2:4,3:4};
const gv=id=>document.getElementById(id)?.value||'';
const gc=id=>document.getElementById(id)?.checked||false;
const getScore=(cid,lv)=>COMPS.find(c=>c.id===cid)[`lv${lv}`].filter(it=>gc(it.id)).length;
const lvPassed=(cid,lv)=>getScore(cid,lv)>=TH[lv];
const allLv1Pass=()=>COMPS.every(c=>lvPassed(c.id,1));
const allLv2Pass=()=>COMPS.every(c=>lvPassed(c.id,2));

// คำนวณระดับจากอายุงาน
function getLevelFromExp(exp){
  var e=parseFloat(exp)||0;
  if(e<3) return 1;
  if(e<=5) return 2;
  return 3;
}

function updateProg(){
  const pct=[0,40,90][curStep];
  const txts=['กรอกข้อมูลส่วนตัวก่อนเริ่มประเมิน','ประเมินตัวชี้วัดแต่ละสมรรถนะ','สรุปผลการประเมิน'];
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('prog-txt').textContent=txts[curStep];
  ['sb0','sb1','sb2'].forEach((id,i)=>{
    document.getElementById(id).classList.toggle('active',i===curStep);
    document.getElementById(id).classList.toggle('done',i<curStep);
  });
}

function goStep(n){
  curStep=n;
  ['p0','p1','p2'].forEach((id,i)=>document.getElementById(id).style.display=i===n?'':'none');
  updateProg();
  if(n===1) renderAssess();
  if(n===2) renderSum();
  window.scrollTo(0,0);
}

function next(from){
  if(from===0){
    const req=['fi','fp','ff','fl','fd','fe','fs'];
    for(const id of req){
      if(!gv(id)){
        alert('กรุณากรอกข้อมูลให้ครบทุกช่องที่มี *');
        document.getElementById(id).focus();
        return;
      }
    }
    maxLv=getLevelFromExp(gv('fe'));
  }
  goStep(from+1);
}

function renderAssess(){
  const lv=maxLv;
  let html='';
  COMPS.forEach(comp=>{
    html+=`<div class="card" style="margin-bottom:10px">
      <div class="comp-hdr">
        <div class="comp-dot" style="background:${comp.dot}"></div>
        <div><div class="comp-name">${comp.name}</div>
        <div style="font-size:11px;color:#9CA3AF">${comp.en}</div></div>
      </div>`;
    for(let l=1;l<=3;l++){
      const inScope=l<=lv;
      const canUnlock=l===1||(l===2&&allLv1Pass())||(l===3&&allLv2Pass());
      const unlocked=inScope&&canUnlock;
      if(!inScope){
        html+=`<div class="lv-block"><div class="lv-locked">— ระดับ ${l} ไม่อยู่ในขอบเขตการประเมินของท่าน</div></div>`;
      } else if(!unlocked){
        const msg=l===2?'🔒 ระดับ 2 จะปลดล็อกเมื่อผ่านระดับ 1 ครบ 5/5 ทั้ง 4 สมรรถนะ':'🔒 ระดับ 3 จะปลดล็อกเมื่อผ่านระดับ 2 ≥ 4/5 ทั้ง 4 สมรรถนะ';
        html+=`<div class="lv-block" id="lb-${comp.id}-${l}"><div class="lv-locked">${msg}</div></div>`;
      } else {
        const sc=getScore(comp.id,l),th=TH[l],pass=sc>=th;
        const pcls=sc===0?'pl':(pass?'pp':'pf');
        const ptxt=sc===0?`0/${th}`:`${sc}/${th} ${pass?'✓':'✗'}`;
        html+=`<div class="lv-block" id="lb-${comp.id}-${l}">
          <div class="lv-bar">
            <div class="lv-label"><span class="badge b${l}">ระดับ ${l}</span>
            <span style="font-size:11px;color:#9CA3AF">เกณฑ์ผ่าน ${th}/5</span></div>
            <span class="pill ${pcls}">${ptxt}</span>
          </div>`;
        const lvDone = lvPassed(comp.id, l);
        comp[`lv${l}`].forEach(it=>{
          const checked = gc(it.id) ? 'checked' : '';
          const locked  = lvDone;
          const rowBg   = locked ? 'background:#F3F4F6;opacity:.7' : '';
          const chkDis  = locked ? 'disabled style="accent-color:#9CA3AF;cursor:not-allowed"' : '';
          const txtClr  = locked ? 'color:#9CA3AF' : 'color:#111827';
          html+=`<div class="ind-row" id="row-${it.id}" style="${rowBg}">
            <input type="checkbox" class="chk" id="${it.id}" ${checked} ${chkDis} onchange="onTick('${comp.id}',${l})">
            <div><div class="ind-name" style="${txtClr}">${it.n}</div><div class="ind-desc">${it.d}</div></div>
          </div>`;
        });
        html+=`</div>`;
      }
    }
    html+=`<div class="score-row">
      <span class="score-lbl">รวม</span>
      <div class="pills" id="pills-${comp.id}"></div>
    </div>
    <div class="banner" id="ban-${comp.id}"></div>
    </div>`;
  });
  document.getElementById('comp-wrap').innerHTML=html;
  COMPS.forEach(c=>refreshPills(c.id));
}

function saveState(){
  var state={};
  COMPS.forEach(comp=>{
    state[comp.id]={};
    [1,2,3].forEach(l=>{
      state[comp.id]['lv'+l]=comp['lv'+l].map(it=>document.getElementById(it.id)?.checked||false);
    });
  });
  return state;
}

function restoreState(state){
  COMPS.forEach(comp=>{
    [1,2,3].forEach(l=>{
      var vals=state[comp.id]?.['lv'+l]||[];
      comp['lv'+l].forEach((it,i)=>{
        var el=document.getElementById(it.id);
        if(el) el.checked=vals[i]||false;
      });
    });
  });
}

function onTick(cid,lv){
  COMPS.forEach(c=>refreshPills(c.id));
  if(lv===1&&allLv1Pass()&&maxLv>=2){
    var st=saveState(); renderAssess(); restoreState(st); COMPS.forEach(c=>refreshPills(c.id));
  }
  if(lv===2&&allLv2Pass()&&maxLv>=3){
    var st=saveState(); renderAssess(); restoreState(st); COMPS.forEach(c=>refreshPills(c.id));
  }
}

function refreshPills(cid){
  const lv=maxLv;
  let pills='';
  for(let l=1;l<=lv;l++){
    const sc=getScore(cid,l),th=TH[l],pass=sc>=th;
    const cls=sc===0?'pl':(pass?'pp':'pf');
    pills+=`<span class="pill ${cls}">ระดับ ${l}: ${sc}/${th}${sc>0?(pass?' ✓':' ✗'):''}</span>`;
  }
  const el=document.getElementById('pills-'+cid);
  if(el) el.innerHTML=pills;
  const ban=document.getElementById('ban-'+cid);
  if(ban&&lv>=2){
    const lv1ok=lvPassed(cid,1),sc=getScore(cid,1);
    if(lv1ok){ban.className='banner bok';ban.innerHTML='✅ ระดับ 1 ผ่านแล้ว';ban.style.display='flex';}
    else if(sc>0){ban.className='banner bno';ban.innerHTML=`⚠️ ระดับ 1 ยังไม่ผ่าน (${sc}/5) — ต้องครบ 5/5`;ban.style.display='flex';}
    else ban.style.display='none';
  }
}

function renderSum(){
  const lv=maxLv;
  let allPass=true;
  let html=`<div class="card card-pad" style="margin-bottom:10px">
    <div style="font-size:14px;font-weight:600;margin-bottom:10px">สรุปผลการประเมินสมรรถนะหลัก</div>
    <div class="sum-box">
      <div class="sum-row"><span>ชื่อ-นามสกุล</span><span style="font-weight:600">${gv('fp')}${gv('ff')} ${gv('fl')}</span></div>
      <div class="sum-row"><span>หน่วยงาน</span><span>${gv('fd')}</span></div>
      <div class="sum-row"><span>อายุงาน</span><span>${gv('fe')} ปี</span></div>
      <div class="sum-row"><span>ระดับที่ประเมิน</span><span>1–${lv}</span></div>
      <div class="sum-row"><span>ผู้บังคับบัญชา</span><span>${gv('fs')}</span></div>
    </div>`;
  COMPS.forEach(comp=>{
    let compPass=true,rows='';
    for(let l=1;l<=lv;l++){
      const sc=getScore(comp.id,l),th=TH[l],pass=sc>=th;
      if(!pass) compPass=false;
      rows+=`<div class="sum-row">
        <span style="padding-left:8px"><span class="badge b${l}" style="margin-right:4px">ระดับ ${l}</span></span>
        <span class="${pass?'tpass':'tfail'}">${sc}/${th} ${pass?'ผ่าน':'ไม่ผ่าน'}</span>
      </div>`;
    }
    if(!compPass) allPass=false;
    html+=`<div style="margin-bottom:8px">
      <div style="font-size:11px;font-weight:600;color:#6B7280;padding:4px 0">${comp.name}</div>
      <div class="sum-box" style="padding:8px 12px">${rows}</div>
    </div>`;
  });
  const cls=allPass?'res-ok':'res-no';
  const title=allPass?'✅ ผ่านการประเมินทุกสมรรถนะ':'⚠️ มีสมรรถนะที่ต้องพัฒนาเพิ่มเติม';
  const sub=allPass?'สมรรถนะหลักอยู่ในเกณฑ์ที่กำหนดทุกด้าน':'กรุณาดูรายละเอียดข้างต้นเพื่อวางแผนพัฒนาบุคลากร';
  html+=`<div class="res-box ${cls}">
    <div style="font-size:14px;font-weight:600">${title}</div>
    <div style="font-size:12px;margin-top:4px">${sub}</div>
  </div></div>`;
  document.getElementById('sum-wrap').innerHTML=html;
}

async function submitData(){
  const btn=document.getElementById('btn-submit');
  btn.disabled=true;
  document.getElementById('overlay').classList.add('show');
  const lv=maxLv;
  const payload={
    timestamp: new Date().toISOString(),
    empId: gv('fi'), prefix: gv('fp'),
    fname: gv('ff'), lname: gv('fl'),
    dept: gv('fd'), exp: gv('fe'),
    level: lv, supervisor: gv('fs'),
    scores: {}
  };
  COMPS.forEach(comp=>{
    payload.scores[comp.id]={};
    for(let l=1;l<=3;l++){
      payload.scores[comp.id][`lv${l}`]=comp[`lv${l}`].map(it=>gc(it.id)?1:0);
    }
  });
  try {
    await fetch(SHEETS_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload),mode:'no-cors'});
    document.getElementById('overlay').classList.remove('show');
    document.getElementById('success-overlay').classList.add('show');
  } catch(err) {
    document.getElementById('overlay').classList.remove('show');
    alert('เกิดข้อผิดพลาด: '+err.message);
  }
  btn.disabled=false;
}

function resetForm(){
  document.getElementById('success-overlay').classList.remove('show');
  goStep(0);
  document.querySelectorAll('input[type=checkbox]').forEach(cb=>cb.checked=false);
}

updateProg();
</script>
</body>
</html>
